<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Spreadsheet</title>
<link rel="icon" href="data:,">
<style>
  * { box-sizing: border-box; }
  body {
    font-family: system-ui, Arial;
    margin: 0;
    padding: 20px;
    background: #0f172a;
    color: #e2e8f0;
  }
  h1 { margin: 0 0 15px 0; text-align: center; }

  .toolbar {
    background: #1e293b;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 15px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }
  .toolbar label { font-size: 14px; }
  .toolbar input, .toolbar select {
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid #475569;
    background: #0f172a;
    color: #e2e8f0;
    font-size: 14px;
  }
  .toolbar input[type=text] { width: 50px; text-align: center; text-transform: uppercase; }
  .toolbar button {
    padding: 8px 14px;
    border-radius: 6px;
    border: none;
    background: #2563eb;
    color: white;
    cursor: pointer;
    font-size: 14px;
  }
  .toolbar button:hover:not(:disabled) { background: #1d4ed8; }
  .toolbar button:disabled { opacity: 0.4; cursor: not-allowed; }

  #status {
    margin-left: auto;
    font-size: 13px;
    color: #94a3b8;
    padding: 6px 12px;
    background: #0f172a;
    border-radius: 6px;
    border: 1px solid #334155;
  }

  .command-row {
    background: #1e293b;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 15px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .command-row input {
    flex: 1;
    padding: 10px;
    font-size: 15px;
    border-radius: 6px;
    border: 1px solid #475569;
    background: #0f172a;
    color: #e2e8f0;
  }

  .sheet-wrap {
    overflow: auto;
    background: #1e293b;
    border-radius: 10px;
    padding: 5px;
    max-height: 70vh;
  }
  table {
    border-collapse: collapse;
    width: 100%;
  }
  th, td {
    border: 1px solid #334155;
    padding: 0;
    min-width: 130px;
    height: 32px;
  }
  th {
    background: #334155;
    color: #e2e8f0;
    font-weight: 600;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 2;
    font-size: 13px;
  }
  th.row-header {
    background: #334155;
    min-width: 40px;
    width: 40px;
    position: sticky;
    left: 0;
    z-index: 3;
  }
  td.row-header {
    background: #334155;
    text-align: center;
    font-weight: 600;
    min-width: 40px;
    width: 40px;
    position: sticky;
    left: 0;
    font-size: 13px;
  }
  td input {
    width: 100%;
    height: 100%;
    border: none;
    padding: 6px 8px;
    background: transparent;
    color: #e2e8f0;
    font-size: 14px;
    outline: none;
  }
  td input:focus {
    background: #0c4a6e;
    outline: 2px solid #2563eb;
  }

  .hints {
    margin-top: 15px;
    padding: 12px;
    background: #1e293b;
    border-radius: 10px;
    font-size: 13px;
    color: #94a3b8;
  }
  .hints code {
    background: #0f172a;
    padding: 2px 6px;
    border-radius: 4px;
    color: #fbbf24;
  }
</style>
</head>
<body>

<h1>📊 AI Spreadsheet</h1>

<div class="toolbar">
  <label>From col:</label>
  <input type="text" id="fromCol" value="A" maxlength="2">
  <label>To col:</label>
  <input type="text" id="toCol" value="B" maxlength="2">
  <label>Language:</label>
  <select id="lang">
    <option>Spanish</option>
    <option>French</option>
    <option>German</option>
    <option>Italian</option>
    <option>Portuguese</option>
    <option>Dutch</option>
  </select>
  <button id="btnTranslate" disabled>🌍 Translate</button>
  <button id="btnSummarize" disabled>📝 Summarize</button>
  <button id="btnGrammar" disabled>✍️ Fix Grammar</button>
  <button id="btnSentiment" disabled>😊 Sentiment</button>
  <button id="btnClear">🗑️ Clear Sheet</button>
  <span id="status">⏳ Loading AI...</span>
</div>

<div class="command-row">
  <input type="text" id="commandBox"
         placeholder='Type: translate A to B in French   |   summarize C to D   |   grammar A to B   |   sentiment A to B'>
  <button id="btnRunCmd" disabled>▶ Run</button>
</div>

<div class="sheet-wrap">
  <table id="sheet"></table>
</div>

<div class="hints">
  💡 <b>Tips:</b>
  Click any cell to edit. Put text in column A, then click <code>🌍 Translate</code> to fill column B.<br>
  Or type commands like: <code>translate A to B in German</code>, <code>summarize A to C</code>, <code>grammar B to D</code>
</div>

<script type="module" src="./app.js"></script>
</body>
</html>
