<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Static AI Chat</title>
<style>
  body { font-family: system-ui, Arial; max-width: 700px; margin: 30px auto; padding: 20px; background: #0f172a; color: #e2e8f0; }
  h2 { text-align: center; }
  #chat { border: 1px solid #334155; background: #1e293b; height: 420px; overflow-y: auto; padding: 12px; border-radius: 10px; }
  .msg { margin: 8px 0; padding: 10px 14px; border-radius: 10px; max-width: 80%; white-space: pre-wrap; }
  .user { background: #2563eb; margin-left: auto; text-align: right; }
  .bot  { background: #334155; }
  .row { display: flex; gap: 8px; margin-top: 12px; }
  input { flex: 1; padding: 12px; font-size: 16px; border-radius: 8px; border: 1px solid #475569; background:#1e293b; color:#e2e8f0;}
  button { padding: 12px 18px; font-size: 16px; border-radius: 8px; border: none; background:#2563eb; color:#fff; cursor:pointer;}
  button:disabled { opacity:0.5; cursor:not-allowed; }
  #status { text-align:center; margin: 10px 0; font-size: 14px; color:#94a3b8; }
</style>
</head>
<body>
  <h2>🤖 Static AI (No Server Needed)</h2>
  <div id="status">Initializing...</div>
  <div id="chat"></div>
  <div class="row">
    <input id="input" placeholder="Wait for model to load..." disabled>
    <button id="send" disabled>Send</button>
  </div>

<script type="module">
import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

env.allowLocalModels = false;

const chat   = document.getElementById('chat');
const input  = document.getElementById('input');
const send   = document.getElementById('send');
const status = document.getElementById('status');

function addMsg(text, who) {
  const div = document.createElement('div');
  div.className = 'msg ' + who;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

let generator;
try {
  status.textContent = '⏳ Downloading model (~80MB, cached after first load)...';
  generator = await pipeline('text2text-generation', 'Xenova/LaMini-Flan-T5-77M', {
    progress_callback: (p) => {
      if (p.status === 'progress') {
        status.textContent = `⏳ Loading ${p.file}: ${Math.round(p.progress)}%`;
      }
    }
  });
  status.textContent = '✅ Model loaded. Ready to chat!';
  input.disabled = false;
  send.disabled  = false;
  input.placeholder = 'Type a message and press Enter...';
  input.focus();
} catch (err) {
  status.textContent = '❌ Failed to load model: ' + err.message;
}

async function ask() {
  const text = input.value.trim();
  if (!text || !generator) return;

  addMsg(text, 'user');
  input.value = '';
  input.disabled = true;
  send.disabled  = true;

  const thinking = addMsg('🤔 Thinking...', 'bot');
  try {
    const out = await generator(text, { max_new_tokens: 120, temperature: 0.7 });
    thinking.textContent = out[0].generated_text;
  } catch (e) {
    thinking.textContent = '⚠️ Error: ' + e.message;
  }

  input.disabled = false;
  send.disabled  = false;
  input.focus();
}

send.onclick = ask;
input.addEventListener('keydown', e => { if (e.key === 'Enter') ask(); });
</script>
</body>
</html>
