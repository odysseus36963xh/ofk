<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Static AI Chat</title>
<style>
  body { font-family: Arial; max-width: 700px; margin: 40px auto; padding: 20px; }
  #chat { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 10px; border-radius: 8px; }
  .msg { margin: 8px 0; padding: 8px; border-radius: 6px; }
  .user { background: #dbeafe; text-align: right; }
  .bot { background: #f3f4f6; }
  input, button { padding: 10px; font-size: 16px; }
  input { width: 75%; }
  button { width: 20%; }
</style>
</head>
<body>
  <h2>🤖 Static AI Chatbot</h2>
  <div id="chat"></div>
  <br>
  <input id="input" placeholder="Loading model..." disabled>
  <button id="send" disabled>Send</button>

<script type="module">
import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

const chat = document.getElementById('chat');
const input = document.getElementById('input');
const send = document.getElementById('send');

function addMsg(text, who) {
  const div = document.createElement('div');
  div.className = 'msg ' + who;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

addMsg('Loading AI model... (may take a minute)', 'bot');
const generator = await pipeline('text-generation', 'Xenova/distilgpt2');
addMsg('Ready! Ask me anything.', 'bot');

input.disabled = false;
send.disabled = false;
input.placeholder = "Type a message...";

async function ask() {
  const text = input.value.trim();
  if (!text) return;
  addMsg(text, 'user');
  input.value = '';
  const out = await generator(text, { max_new_tokens: 50, temperature: 0.8 });
  addMsg(out[0].generated_text, 'bot');
}

send.onclick = ask;
input.onkeydown = (e) => { if (e.key === 'Enter') ask(); };
</script>
</body>
</html>
