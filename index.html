<!DOCTYPE html>
<html>
<head><title>WebLLM Chat</title></head>
<body>
<h2>WebLLM Static AI</h2>
<div id="output"></div>
<input id="prompt" placeholder="Ask something...">
<button onclick="run()">Send</button>

<script type="module">
import * as webllm from "https://esm.run/@mlc-ai/web-llm";

const engine = await webllm.CreateMLCEngine(
  "Llama-3.2-1B-Instruct-q4f16_1-MLC",
  { initProgressCallback: (p) => document.getElementById('output').innerText = p.text }
);

window.run = async () => {
  const prompt = document.getElementById('prompt').value;
  const reply = await engine.chat.completions.create({
    messages: [{ role: "user", content: prompt }]
  });
  document.getElementById('output').innerText = reply.choices[0].message.content;
};
</script>
</body>
</html>
